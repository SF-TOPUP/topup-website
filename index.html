<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Up Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Mobile Top-Up</h1>

        <form id="topupForm">

            <label>মোবাইল নাম্বার</label>
            <input type="text" placeholder="01XXXXXXXXX" required>

            <label>অপারেটর নির্বাচন করুন</label>
            <select required>
                <option value="">অপারেটর নির্বাচন করুন</option>
                <option>Grameenphone</option>
                <option>Robi</option>
                <option>Banglalink</option>
                <option>Teletalk</option>
            </select>

            <label>টাকার পরিমাণ</label>
            <input type="number" placeholder="৳ Amount" required>

            <button type="submit">Top-Up করুন</button>

        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
